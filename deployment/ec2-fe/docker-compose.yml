services:
  frontend:
    image: ${DOCKERHUB_USERNAME:-raelqiansyah}/fedifie:${IMAGE_TAG:-latest}
    container_name: fedifie-frontend
    restart: unless-stopped
    cpus: "0.70"
    mem_limit: 512m
    environment:
      - PORT=3000
    expose:
      - "3000"
    networks:
      - fedifie-fe-network

  nginx:
    image: nginx:1.27-alpine
    container_name: fedifie-nginx
    restart: unless-stopped
    cpus: "0.30"
    mem_limit: 128m
    depends_on:
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - fedifie-fe-network

networks:
  fedifie-fe-network:
    driver: bridge
