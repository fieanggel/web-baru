services:
  backend:
    image: ${DOCKERHUB_USERNAME:-raelqiansyah}/bedifie:${IMAGE_TAG:-latest}
    container_name: bedifie-backend
    restart: unless-stopped
    environment:
      - PORT=${PORT:-4000}
      - DB_HOST=${DB_HOST:-dbdifie.cgxgc8wsgidd.us-east-1.rds.amazonaws.com}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER:-admin}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - DB_NAME=${DB_NAME:-user_crud}
      - DB_CONNECT_TIMEOUT=${DB_CONNECT_TIMEOUT:-10000}
      - DB_SSL=${DB_SSL:-false}
      - DB_SSL_REJECT_UNAUTHORIZED=${DB_SSL_REJECT_UNAUTHORIZED:-true}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - ADMIN_SEED_NAME=${ADMIN_SEED_NAME:-Administrator}
      - ADMIN_SEED_EMAIL=${ADMIN_SEED_EMAIL:-admin@gmail.com}
      - ADMIN_SEED_PASSWORD=${ADMIN_SEED_PASSWORD:-admin123}
      - ADMIN_SEED_FORCE_PASSWORD_RESET=${ADMIN_SEED_FORCE_PASSWORD_RESET:-false}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://98.80.187.179}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME:-bucket-difie}
      - S3_UPLOAD_TIMEOUT_MS=${S3_UPLOAD_TIMEOUT_MS:-20000}
      - UPLOAD_STORAGE_MODE=${UPLOAD_STORAGE_MODE:-auto}
      - LOCAL_UPLOAD_FALLBACK_ENABLED=${LOCAL_UPLOAD_FALLBACK_ENABLED:-true}
      - LOCAL_UPLOAD_ROOT=${LOCAL_UPLOAD_ROOT:-/app/uploads}
      - S3_CIRCUIT_BREAKER_MS=${S3_CIRCUIT_BREAKER_MS:-300000}
    volumes:
      - backend_uploads:/app/uploads
    ports:
      - "4000:4000"

volumes:
  backend_uploads:
    name: bedifie-backend-uploads
