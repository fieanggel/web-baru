name: Deploy 3-Tier App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FE_PUBLIC_IP: 98.80.187.179
  BE_PRIVATE_IP: 10.20.2.77
  EC2_USER: ubuntu
  DOCKERHUB_USERNAME: raelqiansyah
  REPO_URL: https://github.com/fieanggel/web-baru.git
  REPO_DIR: /home/ubuntu/web-baru
  RDS_HOST: dbdifie.cgxgc8wsgidd.us-east-1.rds.amazonaws.com

jobs:
  build-images:
    name: Build and Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Docker Hub token
        run: |
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "DOCKERHUB_TOKEN secret is empty. Set GitHub secret DOCKERHUB_TOKEN before deploy." >&2
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/bedifie:latest
            ${{ env.DOCKERHUB_USERNAME }}/bedifie:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=/api
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/fedifie:latest
            ${{ env.DOCKERHUB_USERNAME }}/fedifie:${{ github.sha }}

  deploy-backend:
    name: Deploy Backend via Bastion
    needs: build-images
    runs-on: ubuntu-latest

    steps:
      - name: SSH to FE then deploy backend to BE
        uses: appleboy/ssh-action@v1.2.0
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          ADMIN_SEED_PASSWORD: ${{ secrets.ADMIN_SEED_PASSWORD }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_S3_BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        with:
          host: ${{ env.FE_PUBLIC_IP }}
          username: ${{ env.EC2_USER }}
          key: ${{ secrets.EC2_PEM_KEY || secrets.EC2_SSH_KEY }}
          envs: DB_PASSWORD,ADMIN_SEED_PASSWORD,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_REGION,AWS_S3_BUCKET_NAME,DOCKERHUB_TOKEN,REPO_DIR,REPO_URL,RDS_HOST,FE_PUBLIC_IP,BE_PRIVATE_IP,EC2_USER,DOCKERHUB_USERNAME
          script: |
            set -e
            if [ -z "${DB_PASSWORD}" ]; then
              echo "DB_PASSWORD secret is empty. Set GitHub secret DB_PASSWORD before deploy." >&2
              exit 1
            fi

            if [ -z "${AWS_ACCESS_KEY_ID}" ] || [ -z "${AWS_SECRET_ACCESS_KEY}" ]; then
              echo "AWS_ACCESS_KEY_ID or AWS_SECRET_ACCESS_KEY is empty. Set GitHub secrets before deploy for S3 upload." >&2
              exit 1
            fi

            if [ -z "${AWS_S3_BUCKET_NAME}" ]; then
              echo "AWS_S3_BUCKET_NAME is empty. Set GitHub secret AWS_S3_BUCKET_NAME before deploy." >&2
              exit 1
            fi

            SSH_BE_KEY_PATH="/home/ubuntu/keydifie.pem"
            if [ ! -f "${SSH_BE_KEY_PATH}" ]; then
              echo "Missing SSH key on FE: ${SSH_BE_KEY_PATH}. Add the key file to FE host for BE hop." >&2
              exit 1
            fi
            chmod 600 "${SSH_BE_KEY_PATH}"

            if [ ! -d "${REPO_DIR}/.git" ]; then
              git clone "${REPO_URL}" "${REPO_DIR}"
            fi

            cd "${REPO_DIR}"
            git pull origin main

            if [ -n "${DOCKERHUB_TOKEN}" ]; then
              echo "${DOCKERHUB_TOKEN}" | docker login --username "${DOCKERHUB_USERNAME}" --password-stdin
            fi

            docker pull "${DOCKERHUB_USERNAME}/bedifie:latest"
            docker save "${DOCKERHUB_USERNAME}/bedifie:latest" \
              | ssh -i "${SSH_BE_KEY_PATH}" -o StrictHostKeyChecking=no "${EC2_USER}@${BE_PRIVATE_IP}" "sudo docker load"

            ssh -i "${SSH_BE_KEY_PATH}" -o StrictHostKeyChecking=no "${EC2_USER}@${BE_PRIVATE_IP}" "mkdir -p '${REPO_DIR}/deployment/ec2-be'"
            scp -i "${SSH_BE_KEY_PATH}" -o StrictHostKeyChecking=no \
              "${REPO_DIR}/deployment/ec2-be/docker-compose.yml" \
              "${EC2_USER}@${BE_PRIVATE_IP}:${REPO_DIR}/deployment/ec2-be/docker-compose.yml"

            AWS_ACCESS_KEY_ID_CLEAN="$(printf '%s' "${AWS_ACCESS_KEY_ID}" | tr -d '\r\n')"
            AWS_SECRET_ACCESS_KEY_CLEAN="$(printf '%s' "${AWS_SECRET_ACCESS_KEY}" | tr -d '\r\n')"
            AWS_REGION_CLEAN="$(printf '%s' "${AWS_REGION:-us-east-1}" | tr -d '\r\n')"
            AWS_S3_BUCKET_NAME_CLEAN="$(printf '%s' "${AWS_S3_BUCKET_NAME}" | tr -d '\r\n')"

            ENV_TMP_FILE="$(mktemp)"
            {
              echo "DB_HOST=${RDS_HOST}"
              echo "DB_PORT=3306"
              echo "DB_USER=admin"
              echo "DB_PASSWORD=${DB_PASSWORD}"
              echo "DB_NAME=user_crud"
              echo "PORT=4000"
              echo "JWT_SECRET=replace-with-strong-secret"
              echo "JWT_EXPIRES_IN=7d"
              echo "ADMIN_SEED_NAME=Administrator"
              echo "ADMIN_SEED_EMAIL=admin@gmail.com"
              echo "ADMIN_SEED_PASSWORD=${ADMIN_SEED_PASSWORD:-admin123}"
              echo "ADMIN_SEED_FORCE_PASSWORD_RESET=false"
              echo "CORS_ORIGIN=http://${FE_PUBLIC_IP}"
              echo "AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID_CLEAN}"
              echo "AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY_CLEAN}"
              echo "AWS_REGION=${AWS_REGION_CLEAN}"
              echo "AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME_CLEAN}"
            } > "${ENV_TMP_FILE}"

            scp -i "${SSH_BE_KEY_PATH}" -o StrictHostKeyChecking=no \
              "${ENV_TMP_FILE}" \
              "${EC2_USER}@${BE_PRIVATE_IP}:${REPO_DIR}/deployment/ec2-be/.env"
            rm -f "${ENV_TMP_FILE}"

            ssh -i "${SSH_BE_KEY_PATH}" -o StrictHostKeyChecking=no "${EC2_USER}@${BE_PRIVATE_IP}" \
              "cd '${REPO_DIR}/deployment/ec2-be' && sudo docker compose up -d --force-recreate backend"

  deploy-frontend:
    name: Deploy Frontend
    needs:
      - build-images
      - deploy-backend
    runs-on: ubuntu-latest

    steps:
      - name: SSH to FE and deploy frontend
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.FE_PUBLIC_IP }}
          username: ${{ env.EC2_USER }}
          key: ${{ secrets.EC2_PEM_KEY || secrets.EC2_SSH_KEY }}
          envs: REPO_DIR,REPO_URL
          script: |
            set -e
            if [ ! -d "${REPO_DIR}/.git" ]; then
              git clone "${REPO_URL}" "${REPO_DIR}"
            fi

            cd "${REPO_DIR}"
            git pull origin main

            cd deployment/ec2-fe
            docker compose pull frontend
            docker compose up -d --force-recreate