version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
    image: ${DOCKERHUB_USERNAME:-raelqiansyah}/fedifie:${IMAGE_TAG:-latest}
    container_name: web-baru-frontend
    restart: unless-stopped
    environment:
      - PORT=3000
    expose:
      - "3000"
    networks:
      - web-baru-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${DOCKERHUB_USERNAME:-raelqiansyah}/bedifie:${IMAGE_TAG:-latest}
    container_name: web-baru-backend
    restart: unless-stopped
    environment:
      - PORT=4000
      - DB_HOST=${DB_HOST:-127.0.0.1}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-}
      - DB_NAME=${DB_NAME:-user_crud}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME:-bucket-difie}
    expose:
      - "4000"
    networks:
      - web-baru-network

  nginx:
    image: nginx:1.27-alpine
    container_name: web-baru-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - web-baru-network

networks:
  web-baru-network:
    driver: bridge